spring:
  application:
    name: live-streaming-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/livestream}
    username: ${DB_USERNAME:livestream}
    password: ${DB_PASSWORD:livestream}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  jackson:
    time-zone: UTC

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  application:
    name: ${spring.application.name}
    description: Backend for the live streaming Android application

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:dev-only-jwt-secret-change-before-production-1234567890}
    access-token-ttl: PT15M
  refresh-token-ttl: P30D
  otp:
    secret: ${AUTH_OTP_SECRET:dev-only-otp-secret-change-before-production-1234567890}
    expires-in: PT5M
    resend-cooldown: PT1M
    max-attempts: 5
    max-sends-per-destination: 3
    max-sends-per-ip: 10
    rate-window: PT15M
    expose-code: false

agora:
  app-id: ${AGORA_APP_ID:}
  app-certificate: ${AGORA_APP_CERTIFICATE:}
  token-ttl: ${AGORA_TOKEN_TTL:PT15M}
