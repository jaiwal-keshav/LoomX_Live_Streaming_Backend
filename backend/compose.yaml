services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: livestream
      POSTGRES_USER: livestream
      POSTGRES_PASSWORD: livestream
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livestream -d livestream"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - livestream-postgres-data:/var/lib/postgresql/data

volumes:
  livestream-postgres-data:
